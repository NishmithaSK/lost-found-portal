<!DOCTYPE html>
<html>

<head>

    <title>Reports</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="container">

        <h1>All Reports</h1>

        <table>

            <tr>

                <th>ID</th>
                <th>Item</th>
                <th>Status</th>
                <th>Location</th>
                <th>Contact</th>

            </tr>

            {% for item in reports %}

            <tr>

                <td>{{ item[0] }}</td>
                <td>{{ item[1] }}</td>
                <td>{{ item[2] }}</td>
                <td>{{ item[3] }}</td>
                <td>{{ item[4] }}</td>

            </tr>

            {% endfor %}

        </table>

        <a href="/" class="view-btn">

            Back to Home

        </a>

    </div>

</body>

</html>
